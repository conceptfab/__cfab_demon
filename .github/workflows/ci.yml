name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      # timeflow-dashboard embeds dashboard/dist via include_dir! — build the frontend first.
      - run: cd dashboard && npm ci && npm run build
      - run: cargo test -p timeflow-shared -p timeflow-demon -p timeflow-dashboard

  frontend:
    runs-on: macos-14
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: cd src-tauri && node scripts/gen_webrpc.cjs --check
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  quality:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      # react-doctor lints the dashboard sources; install deps first.
      - run: cd dashboard && npm ci
      - run: npx -y react-doctor@latest . --yes

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deny --locked
      - run: cargo deny check advisories bans
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd dashboard && npm audit --omit=dev || true
